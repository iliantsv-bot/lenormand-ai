<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lenormand AI</title>
</head>
<body>

<h1>Lenormand AI</h1>

<select id="spread">
  <option value="1">1 Card</option>
  <option value="3" selected>3 Cards</option>
  <option value="5">5 Cards</option>
  <option value="mirror">Mirror</option>
  <option value="yesno">Yes / No</option>
</select>

<br><br>

<button onclick="drawCard()">Draw Cards</button>

<div id="cards" style="margin-top:20px;font-weight:bold;"></div>
<div id="result" style="margin-top:20px;white-space:pre-line;"></div>

<script>
async function drawCard() {
  const result = document.getElementById("result");
  const cardsDiv = document.getElementById("cards");
  const spread = document.getElementById("spread").value;

  result.innerText = "Loading...";
  cardsDiv.innerText = "";

  try {
    const res = await fetch(`https://lenormand-ai.vercel.app/api/reading?spread=${spread}`);

    if (!res.ok) {
      const text = await res.text();
      console.log("API ERROR:", text);
      result.innerText = "Server error";
      return;
    }

    const data = await res.json();

    if (!data.cards || !data.text) {
      result.innerText = "Invalid response from AI";
      return;
    }

    cardsDiv.innerText = "Cards: " + data.cards.join(", ");
    result.innerText = data.text;

  } catch (err) {
    console.log(err);
    result.innerText = "Error loading AI";
  }
}
</script>

</body>
</html>
