<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lenormand AI</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
  padding: 20px;
}
h1 { color: #ffd700; }
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
  font-size: 16px;
}
button {
  background: #ffd700;
  color: black;
  padding: 12px 20px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
#result { margin-top: 20px; line-height: 1.6; }
.cards { color: #00ffc3; font-weight: bold; margin-bottom: 10px; }
</style>
</head>

<body>

<h1>🔮 Lenormand AI</h1>

<!-- LOGIN -->
<button onclick="loginWithGoogle()">Влезте с Google</button>

<select id="lang">
  <option value="bg">Български</option>
  <option value="en">English</option>
</select>

<input id="question" placeholder="Задай въпрос..." />

<select id="spread">
  <option value="1">1 карта</option>
  <option value="3" selected>3 карти</option>
  <option value="5">5 карти</option>
  <option value="mirror">Mirror</option>
  <option value="yesno">Да / Не</option>
</select>

<button onclick="drawCards()" id="drawBtn">Изтегли карти</button>

<div id="result"></div>

<script>
const params = new URLSearchParams(window.location.search);
const langParam = params.get("lang");

const userLang = navigator.language || navigator.userLanguage;

if (langParam) {
  document.getElementById("lang").value = langParam;
} else {
  document.getElementById("lang").value = userLang.startsWith("bg") ? "bg" : "en";
}

function updateUIText() {
  const lang = document.getElementById("lang").value;

  document.getElementById("question").placeholder =
    lang === "bg" ? "Задай въпрос..." : "Ask your question...";

  document.getElementById("drawBtn").innerText =
    lang === "bg" ? "Изтегли карти" : "Draw Cards";
}

document.getElementById("lang").addEventListener("change", updateUIText);
updateUIText();

async function drawCards() {
  const question = document.getElementById("question").value;
  const spread = document.getElementById("spread").value;
  const lang = document.getElementById("lang").value;
  const result = document.getElementById("result");

  result.innerHTML = lang === "bg" ? "⏳ Тълкуване..." : "⏳ Reading...";

  try {
    const res = await fetch(`/api/reading?spread=${spread}&q=${encodeURIComponent(question)}&lang=${lang}`);
    const data = await res.json();

    result.innerHTML = `
      <div class="cards">${lang === "bg" ? "Карти" : "Cards"}: ${(data.cards || []).join(", ")}</div>
      <div style="white-space: pre-line;">${data.text || ""}</div>
    `;
  } catch (err) {
    result.innerHTML = lang === "bg"
      ? "❌ Грешка при зареждане"
      : "❌ Error loading AI";
  }
}
</script>

<!-- FIREBASE (ЕДИН СКРИПТ) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5Dns_eABdim-4OWn6YR8tmIVQ3aSMj_Q",
  authDomain: "madame-lenormand.firebaseapp.com",
  projectId: "madame-lenormand",
  storageBucket: "madame-lenormand.firebasestorage.app",
  messagingSenderId: "982255445581",
  appId: "1:982255445581:web:13c375654864385ff11e04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginWithGoogle = function () {
  signInWithRedirect(auth, provider);
};

getRedirectResult(auth)
  .then((result) => {
    if (result?.user) {
      document.getElementById("result").innerHTML =
        "✅ Влязъл си като: " + result.user.email;
    }
  })
  .catch((error) => {
    document.getElementById("result").innerHTML =
      "❌ Грешка: " + error.message;
  });
</script>

</body>
</html>
