<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lenormand AI</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
  padding: 20px;
}

h1 {
  color: #ffd700;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
  font-size: 16px;
}

button {
  background: #ffd700;
  color: black;
  padding: 12px 20px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  line-height: 1.6;
}
.cards {
  color: #00ffc3;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🔮 Lenormand AI</h1>

<select id="lang">
  <option value="bg">Български</option>
  <option value="en">English</option>
</select>

<input id="question" placeholder="Задай въпрос..." />

<select id="spread">
  <option value="1">1 карта</option>
  <option value="3" selected>3 карти</option>
  <option value="5">5 карти</option>
  <option value="mirror">Mirror</option>
  <option value="yesno">Да / Не</option>
</select>

<button onclick="drawCards()">Изтегли карти</button>

<div id="result"></div>

<script>
async function drawCards() {
  const question = document.getElementById("question").value;
  const spread = document.getElementById("spread").value;
  const lang = document.getElementById("lang").value;
  const result = document.getElementById("result");

  result.innerHTML = "⏳ Зареждане...";

  try {
    const res = await fetch(`/api/reading?spread=${spread}&q=${encodeURIComponent(question)}&lang=${lang}`);
    
    let data = await res.json();

    // FIX за JSON/string проблем
    if (typeof data === "string") {
      data = JSON.parse(data);
    }

    const text = data.text || "Няма резултат";
    const cards = data.cards || [];

    result.innerHTML = `
      <div class="cards">Cards: ${cards.join(", ")}</div>
      <div style="white-space: pre-line;">${text}</div>
    `;

  } catch (err) {
    result.innerHTML = "❌ Error loading AI";
  }
}

/* AUTO LINK PARAMS */
const params = new URLSearchParams(window.location.search);

const q = params.get("q");
const spreadParam = params.get("spread");
const langParam = params.get("lang");

if (q) document.getElementById("question").value = q;
if (spreadParam) document.getElementById("spread").value = spreadParam;
if (langParam) document.getElementById("lang").value = langParam;

if (q || spreadParam || langParam) {
  drawCards();
}
</script>

</body>
</html>
