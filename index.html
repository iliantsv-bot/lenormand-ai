<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lenormand AI</title>  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 {
      color: gold;
    }

    input, select {
      padding: 12px;
      font-size: 16px;
      margin: 10px 0;
      width: 300px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      background: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .cards {
      margin-top: 20px;
      font-weight: bold;
      color: #00ffcc;
    }

    .result {
      margin-top: 20px;
      line-height: 1.6;
      max-width: 700px;
      white-space: pre-wrap;
    }

    .loading {
      color: orange;
    }

    .error {
      color: red;
    }
  </style></head><body><h1>🔮 Lenormand AI</h1><input id="question" placeholder="Ask your question..." /><br><select id="spread">
  <option value="1">1 Card</option>
  <option value="3" selected>3 Cards</option>
  <option value="5">5 Cards</option>
  <option value="mirror">Mirror Reading</option>
  <option value="yesno">Yes / No</option>
</select><br><button onclick="drawCards()">Draw Cards</button>

<div class="cards" id="cards"></div>
<div class="result" id="result"></div><script>
async function drawCards() {
  const question = document.getElementById("question").value.trim();
  const spread = document.getElementById("spread").value;

  const resultEl = document.getElementById("result");
  const cardsEl = document.getElementById("cards");

  resultEl.className = "result loading";
  resultEl.innerText = "Loading reading...";
  cardsEl.innerText = "";

  try {
    const response = await fetch("/api/reading", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: question || "General reading",
        spread: spread
      })
    });

    // Проверка дали отговорът е JSON
    const contentType = response.headers.get("content-type");

    if (!contentType || !contentType.includes("application/json")) {
      throw new Error("Server returned invalid response (not JSON)");
    }

    const data = await response.json();

    if (data.error) {
      throw new Error(data.error);
    }

    cardsEl.innerText = "Cards: " + (data.cards?.join(", ") || "No cards");

    resultEl.className = "result";
    resultEl.innerText = data.text || "No interpretation received";

  } catch (err) {
    resultEl.className = "result error";
    resultEl.innerText = "Error: " + err.message;
  }
}
</script></body>
</html>
