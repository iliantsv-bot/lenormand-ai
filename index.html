<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lenormand AI</title>
</head>
<body>

<h1>Lenormand AI</h1>

<button onclick="drawCard()">Draw Cards</button>

<div id="cards" style="margin-top:20px;"></div>
<div id="result" style="margin-top:20px; font-size:18px;"></div>

<script>
async function drawCard() {
  const result = document.getElementById("result");
  const cardsDiv = document.getElementById("cards");

  result.innerText = "Loading...";
  cardsDiv.innerText = "";

  try {
    const res = await fetch('/api');

    const data = await res.json();

    console.log("API RESPONSE:", data);

    // ако API върне грешка
    if (!res.ok) {
      result.innerText = JSON.stringify(data);
      return;
    }

    cardsDiv.innerText = "Cards: " + data.cards.join(", ");
    result.innerText = data.text || "No reading";

  } catch (err) {
    console.log("FRONT ERROR:", err);
    result.innerText = err.message;
  }
}
</script>

</body>
</html>
