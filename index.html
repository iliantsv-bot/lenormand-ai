<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lenormand AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }

    h1 {
      color: gold;
    }

    select, button, input {
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      background: gold;
      border: none;
      cursor: pointer;
    }

    #cards {
      margin-top: 20px;
      font-weight: bold;
      color: #00ffcc;
    }

    #result {
      margin-top: 20px;
      white-space: pre-line;
      line-height: 1.6;
    }

    #question {
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>

<h1>🔮 Lenormand AI</h1>

<input id="question" placeholder="Ask your question..." />

<br>

<select id="spread">
  <option value="1">1 Card</option>
  <option value="3" selected>3 Cards</option>
  <option value="5">5 Cards</option>
  <option value="mirror">Mirror Reading</option>
  <option value="yesno">Yes / No</option>
</select>

<br>

<button onclick="drawCard()">Draw Cards</button>

<div id="cards"></div>
<div id="result"></div>

<script>
async function drawCard() {
  const result = document.getElementById("result");
  const cardsDiv = document.getElementById("cards");
  const spread = document.getElementById("spread").value;
  const question = document.getElementById("question").value;

  result.innerText = "Loading...";
  cardsDiv.innerText = "";

  try {
    let url = "https://lenormand-ai.vercel.app/api/reading?spread=" + spread;

    if (question) {
      url += "&q=" + encodeURIComponent(question);
    }

    console.log("CALL:", url);

    const res = await fetch(url);

    const raw = await res.text();
    console.log("RAW:", raw);

    const data = JSON.parse(raw);

    if (!data.cards || !data.text) {
      result.innerText = "Invalid response from AI";
      return;
    }

    // Карти
    cardsDiv.innerText = "🃏 Cards: " + data.cards.join(" • ");

    // YES / NO подсилване
    let output = data.text;

    if (spread === "yesno") {
      output = "👉 ANSWER: " + output;
    }

    if (spread === "mirror") {
      output = "🪞 MIRROR READING:\n\n" + output;
    }

    if (question) {
      output = "❓ Question: " + question + "\n\n" + output;
    }

    result.innerText = output;

  } catch (err) {
    console.log(err);
    result.innerText = "Error loading AI";
  }
}
</script>

</body>
</html>
