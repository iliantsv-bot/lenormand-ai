<!DOCTYPE html><html lang="bg">
<head>
<meta charset="UTF-8">
<title>Lenormand AI</title><style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
  padding:30px;
}

h1 { color:gold; }

input, select {
  padding:12px;
  margin:10px 0;
  font-size:16px;
  width:280px;
}

button {
  padding:12px 20px;
  font-size:16px;
  background:gold;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#cards {
  margin-top:20px;
  font-weight:bold;
  color:#00ffcc;
}

#result {
  margin-top:20px;
  line-height:1.6;
  white-space:pre-line;
}
</style></head>
<body><h1 id="title">🔮 Lenormand AI</h1><select id="lang">
  <option value="bg">Български</option>
  <option value="en">English</option>
</select><br><input id="question" placeholder="Задай въпрос..." /><br><select id="spread">
  <option value="1">1 карта</option>
  <option value="3" selected>3 карти</option>
  <option value="5">5 карти</option>
  <option value="mirror">Огледален</option>
  <option value="yesno">Да / Не</option>
</select><br><button id="btn" onclick="drawCards()">Изтегли карти</button>

<div id="cards"></div>
<div id="result"></div><script>

// 🌍 преводи
const t = {
  bg: {
    placeholder: "Задай въпрос...",
    button: "Изтегли карти",
    loading: "Зареждане..."
  },
  en: {
    placeholder: "Ask your question...",
    button: "Draw Cards",
    loading: "Loading..."
  }
};

// смяна на език (UI)
document.getElementById("lang").addEventListener("change", () => {
  const lang = document.getElementById("lang").value;

  document.getElementById("question").placeholder = t[lang].placeholder;
  document.getElementById("btn").innerText = t[lang].button;
});

// 🔮 основна функция
async function drawCards() {

  const question = document.getElementById("question").value.trim();
  const spread = document.getElementById("spread").value;
  const lang = document.getElementById("lang").value;

  const result = document.getElementById("result");
  const cards = document.getElementById("cards");

  result.innerText = t[lang].loading;
  cards.innerText = "";

  try {
    const res = await fetch("/api/reading", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: question || (lang === "bg" ? "Общо тълкуване" : "General reading"),
        spread: spread,
        lang: lang
      })
    });

    const data = await res.json();

    cards.innerText = "Cards: " + data.cards.join(", ");
    result.innerText = data.text;

  } catch (err) {
    result.innerText = "Error loading AI";
  }
}

</script></body>
</html>
